<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LavarCar — Sistema de Gestão</title>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ======================================================
   DESIGN SYSTEM — LavarCar
   Paleta: azul-petróleo (#0B4F6C) + âmbar (#F5A623)
   Tipografia: DM Sans (corpo) + Syne (display)
====================================================== */
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@600;700&display=swap');

:root {
  --brand: #0B4F6C;
  --brand-light: #E8F4FD;
  --brand-mid: #1976A3;
  --accent: #F5A623;
  --accent-light: #FEF3DC;
  --danger: #D93025;
  --danger-light: #FDE8E7;
  --success: #1A7A4A;
  --success-light: #E6F4ED;
  --warning: #C47F00;
  --warning-light: #FFF8E1;
  --gray-50: #F8F9FA;
  --gray-100: #F1F3F5;
  --gray-200: #E9ECEF;
  --gray-300: #DEE2E6;
  --gray-400: #ADB5BD;
  --gray-600: #6C757D;
  --gray-700: #495057;
  --gray-900: #212529;
  --white: #FFFFFF;
  --sidebar-w: 240px;
  --topbar-h: 60px;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--gray-900); background: var(--gray-50); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 99px; }

/* ── TELA DE LOGIN ── */
#login-screen {
  display: none;
  min-height: 100vh;
  background: linear-gradient(135deg, #0B4F6C 0%, #1976A3 50%, #0D3B52 100%);
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
#login-screen.active { display: flex; }

.login-card {
  background: var(--white);
  border-radius: 16px;
  padding: 2.5rem 2rem;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow-md);
}

.login-logo {
  text-align: center;
  margin-bottom: 2rem;
}
.login-logo h1 {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  color: var(--brand);
  letter-spacing: -0.5px;
}
.login-logo span { color: var(--accent); }
.login-logo p { font-size: 13px; color: var(--gray-600); margin-top: 4px; }

/* ── LAYOUT PRINCIPAL ── */
#app-screen {
  display: none;
  height: 100vh;
  overflow: hidden;
}
#app-screen.active { display: flex; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--brand);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  transition: transform .25s ease;
  z-index: 100;
}

.sidebar-logo {
  padding: 1.25rem 1rem 1rem;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.sidebar-logo h1 {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  color: var(--white);
  letter-spacing: -0.3px;
}
.sidebar-logo h1 span { color: var(--accent); }
.sidebar-logo p { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 2px; }

.sidebar-section {
  padding: .75rem 0 .25rem;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,.4);
  padding-left: 1rem;
}

.sidebar nav { flex: 1; padding: .25rem 0; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: .6rem 1rem;
  cursor: pointer;
  color: rgba(255,255,255,.7);
  font-size: 13.5px;
  font-weight: 500;
  border-radius: 0;
  transition: all .15s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.nav-item:hover { color: var(--white); background: rgba(255,255,255,.08); }
.nav-item.active { color: var(--white); background: rgba(255,255,255,.15); border-right: 3px solid var(--accent); }
.nav-item .icon { font-size: 16px; width: 20px; flex-shrink: 0; }

.sidebar-footer {
  padding: .75rem 1rem;
  border-top: 1px solid rgba(255,255,255,.1);
}
.sidebar-user { font-size: 12px; color: rgba(255,255,255,.6); margin-bottom: .5rem; }
.sidebar-user strong { display: block; color: var(--white); font-size: 13px; }

/* ── CONTEÚDO PRINCIPAL ── */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: var(--topbar-h);
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  padding: 0 1.25rem;
  gap: 12px;
  flex-shrink: 0;
}

.menu-btn {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 20px;
  color: var(--gray-700);
  padding: 4px;
}

.topbar-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--gray-900);
  flex: 1;
}

.alert-badge {
  background: var(--danger);
  color: var(--white);
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 7px;
}

/* ── ÁREA DA PÁGINA ── */
.page-area {
  flex: 1;
  overflow-y: auto;
  padding: 1.25rem;
}

/* ── CARDS & GRID ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 1.25rem;
}
@media (max-width: 600px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
}

.stat-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 1rem;
  box-shadow: var(--shadow);
}
.stat-card .label { font-size: 12px; color: var(--gray-600); font-weight: 500; margin-bottom: 6px; }
.stat-card .value { font-size: 24px; font-weight: 600; font-family: 'Syne', sans-serif; color: var(--brand); }
.stat-card .sub { font-size: 11px; color: var(--gray-600); margin-top: 4px; }
.stat-card.accent .value { color: var(--accent); }
.stat-card.danger .value { color: var(--danger); }
.stat-card.success .value { color: var(--success); }

.card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 1.25rem;
  box-shadow: var(--shadow);
  margin-bottom: 1rem;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}
.card-title {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--gray-900);
}

/* ── BOTÕES ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: .5rem 1rem;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all .15s;
  white-space: nowrap;
}
.btn-primary { background: var(--brand); color: var(--white); }
.btn-primary:hover { background: var(--brand-mid); }
.btn-accent { background: var(--accent); color: var(--white); border-color: var(--accent); }
.btn-outline { background: var(--white); color: var(--brand); border-color: var(--brand); }
.btn-outline:hover { background: var(--brand-light); }
.btn-danger { background: var(--danger); color: var(--white); }
.btn-sm { padding: .3rem .65rem; font-size: 12px; border-radius: 6px; }
.btn-ghost { background: transparent; border-color: var(--gray-300); color: var(--gray-700); }
.btn-ghost:hover { background: var(--gray-100); }
.btn-success { background: var(--success); color: var(--white); }

/* ── FORMULÁRIOS ── */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--gray-700); }
.form-group input,
.form-group select,
.form-group textarea {
  padding: .5rem .75rem;
  border: 1.5px solid var(--gray-300);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--gray-900);
  background: var(--white);
  outline: none;
  transition: border-color .15s;
  width: 100%;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--brand); }
.form-group textarea { resize: vertical; min-height: 70px; }
.form-row { display: flex; gap: 12px; flex-wrap: wrap; }
.form-row .form-group { flex: 1; min-width: 150px; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; padding-top: 1rem; border-top: 1px solid var(--gray-200); margin-top: 1rem; }

/* ── TABELAS ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  text-align: left;
  padding: .65rem .75rem;
  background: var(--gray-50);
  border-bottom: 1px solid var(--gray-200);
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-600);
  white-space: nowrap;
}
tbody td {
  padding: .65rem .75rem;
  border-bottom: 1px solid var(--gray-100);
  color: var(--gray-900);
  vertical-align: middle;
}
tbody tr:hover { background: var(--gray-50); }
tbody tr:last-child td { border-bottom: none; }

/* ── STATUS BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-agendado { background: var(--brand-light); color: var(--brand); }
.badge-confirmado { background: #E8F5E9; color: #1B5E20; }
.badge-em_andamento { background: var(--warning-light); color: var(--warning); }
.badge-concluido { background: var(--success-light); color: var(--success); }
.badge-cancelado { background: var(--danger-light); color: var(--danger); }
.badge-admin { background: var(--accent-light); color: #7A4F00; }
.badge-usuario { background: var(--gray-100); color: var(--gray-700); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 500;
  align-items: flex-start;
  justify-content: center;
  padding: 1.5rem;
  overflow-y: auto;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--white);
  border-radius: 14px;
  width: 100%;
  max-width: 580px;
  box-shadow: var(--shadow-md);
  margin: auto;
  max-height: 90vh;
  overflow-y: auto;
}
.modal.modal-lg {
  max-width: 860px;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--gray-200);
  position: sticky;
  top: 0;
  background: var(--white);
  z-index: 1;
}
.modal-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 600; }
.modal-close {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 20px;
  color: var(--gray-600);
  width: 32px;
  height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover { background: var(--gray-100); }
.modal-body { padding: 1.5rem; }

/* ── SEARCH BAR ── */
.search-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}
.search-bar input, .search-bar select {
  flex: 1;
  min-width: 140px;
  padding: .5rem .75rem;
  border: 1.5px solid var(--gray-300);
  border-radius: 8px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
}
.search-bar input:focus, .search-bar select:focus { border-color: var(--brand); }

/* ── ALERTA 30 DIAS ── */
.alerta-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: .75rem;
  background: var(--warning-light);
  border: 1px solid #FFE082;
  border-radius: 8px;
  margin-bottom: .5rem;
}
.alerta-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 14px;
  flex-shrink: 0;
}
.alerta-info { flex: 1; min-width: 0; }
.alerta-info strong { display: block; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.alerta-info span { font-size: 12px; color: var(--gray-600); }
.alerta-dias {
  font-size: 11px;
  font-weight: 600;
  background: var(--accent);
  color: var(--white);
  padding: 3px 8px;
  border-radius: 99px;
  white-space: nowrap;
}

/* ── AGENDA VISUAL ── */
.agenda-grid { display: grid; gap: 8px; }
.agenda-item {
  display: grid;
  grid-template-columns: 60px 1fr auto;
  gap: 10px;
  align-items: center;
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  padding: .65rem .75rem;
  border-left: 4px solid var(--brand);
  transition: box-shadow .15s;
}
.agenda-item:hover { box-shadow: var(--shadow-md); }
.agenda-item.agendado { border-left-color: var(--brand); }
.agenda-item.confirmado { border-left-color: var(--success); }
.agenda-item.em_andamento { border-left-color: var(--accent); }
.agenda-item.concluido { border-left-color: var(--gray-400); }
.agenda-item.cancelado { border-left-color: var(--danger); opacity: .6; }
.agenda-hora { font-size: 15px; font-weight: 600; color: var(--brand); font-family: 'Syne', sans-serif; }
.agenda-info strong { display: block; font-size: 13px; }
.agenda-info span { font-size: 12px; color: var(--gray-600); }
.agenda-actions { display: flex; gap: 4px; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--gray-600);
}
.empty-state .icon { font-size: 40px; margin-bottom: .75rem; }
.empty-state p { font-size: 14px; }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast-msg {
  background: var(--gray-900);
  color: var(--white);
  padding: .65rem 1rem;
  border-radius: 8px;
  font-size: 13px;
  box-shadow: var(--shadow-md);
  animation: slideIn .25s ease;
  pointer-events: auto;
  max-width: 320px;
}
.toast-msg.success { background: var(--success); }
.toast-msg.error { background: var(--danger); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── SPINNER ── */
.spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2.5px solid rgba(255,255,255,.3);
  border-top-color: var(--white);
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SEPARADOR ── */
.divider { height: 1px; background: var(--gray-200); margin: 1rem 0; }

/* ── LINK ── */
a.link { color: var(--brand); text-decoration: none; }
a.link:hover { text-decoration: underline; }

/* ── MOBILE SIDEBAR OVERLAY ── */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 99;
}

/* ========== RESPONSIVO ========== */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 1rem;
  align-items: start;
}

@media (max-width: 900px) {
  .dashboard-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 768px) {
  :root { --sidebar-w: 240px; }
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.active { display: block; }
  .menu-btn { display: flex; }
  .main-content { width: 100%; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
  .modal, .modal.modal-lg { max-width: 100%; margin: 0; border-radius: 14px; }
  .page-area { padding: 1rem; }
  .table-wrap { -webkit-overflow-scrolling: touch; }
  .topbar-title { font-size: 14px; }
  #topbar-actions .btn { font-size: 12px; padding: .4rem .65rem; }
  .agenda-item { grid-template-columns: 50px 1fr auto; }
}

@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .search-bar { flex-direction: column; }
  .form-actions { flex-direction: column-reverse; }
  .form-actions .btn { width: 100%; justify-content: center; }
}
/* ── TABELA MOBILE: transforma linhas em cards ── */
@media (max-width: 600px) {
  .table-wrap table { display: block; }
  .table-wrap thead { display: none; }
  .table-wrap tbody { display: flex; flex-direction: column; gap: 8px; }
  .table-wrap tbody tr {
    display: flex;
    flex-direction: column;
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: .65rem .75rem;
    gap: 4px;
  }
  .table-wrap tbody tr:hover { background: var(--white); }
  .table-wrap tbody td {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 0;
    border: none;
    font-size: 13px;
  }
  .table-wrap tbody td:empty { display: none; }
  /* Coluna de ações: sempre no final, alinhada à direita */
  .table-wrap tbody td:last-child {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--gray-100);
    justify-content: flex-end;
    gap: 6px;
  }
  /* Adiciona label antes de cada célula via data-label */
  .table-wrap tbody td[data-label]:before {
    content: attr(data-label);
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-600);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-right: auto;
  }
  .table-wrap tfoot { display: none; }
}

</style>
</head>
<body>

<!-- ═══════════════════ TELA DE LOGIN ═══════════════════ -->
<div id="login-screen" class="active">
  <div class="login-card">
    <div class="login-logo">
      <h1>Lavar<span>Car</span></h1>
      <p>Sistema de Gestão de Lava Car</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="btn-login" onclick="doLogin()" style="margin-top:4px;width:100%;justify-content:center;padding:.7rem">
        Entrar
      </button>
      <p id="login-error" style="color:var(--danger);font-size:12px;text-align:center;display:none"></p>
    </div>
  </div>
</div>

<!-- ═══════════════════ APP PRINCIPAL ═══════════════════ -->
<div id="app-screen">
  <!-- Overlay mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar(false)"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1>Lavar<span>Car</span></h1>
      <p>Gestão Completa</p>
    </div>
    <nav>
      <div class="sidebar-section">Principal</div>
      <button class="nav-item active" onclick="navigate('dashboard')">
        <span class="icon">📊</span> Dashboard
      </button>
      <button class="nav-item" onclick="navigate('agenda')">
        <span class="icon">📅</span> Agenda
      </button>

      <div class="sidebar-section">Cadastros</div>
      <button class="nav-item" onclick="navigate('clientes')">
        <span class="icon">👤</span> Clientes
      </button>
      <button class="nav-item" onclick="navigate('veiculos')">
        <span class="icon">🚗</span> Veículos
      </button>
      <button class="nav-item" onclick="navigate('servicos')">
        <span class="icon">🧴</span> Serviços
      </button>

      <div class="sidebar-section">Financeiro</div>
      <button class="nav-item" onclick="navigate('pacotes')">

// ═══════════════════════════════════════════════════════

function toast(msg, type = 'default') {
  const el = document.createElement('div');
  el.className = `toast-msg ${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function showLoading(el) {
  el.disabled = true;
  el.innerHTML = `<span class="spinner"></span> Aguarde...`;
}

function hideLoading(el, html) {
  el.disabled = false;
  el.innerHTML = html;
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('pt-BR');
}
function formatDateTime(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
}
function formatCurrency(v) {
  return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
function formatDateForInput(d) {
  if (!d) return '';
  return new Date(d).toISOString().slice(0, 16);
}
function diasAtras(d) {
  if (!d) return null;
  return Math.floor((Date.now() - new Date(d).getTime()) / (1000*60*60*24));
}

function isAdmin() {
  return currentPerfil?.perfil === 'admin';
}

function badgeStatus(s) {
  const labels = {
    agendado: 'Agendado',
    confirmado: 'Confirmado',
    em_andamento: 'Em andamento',
    concluido: 'Concluído',
    cancelado: 'Cancelado'
  };
  return `<span class="badge badge-${s}">${labels[s] || s}</span>`;
}

function getInitials(nome) {
  return nome?.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase() || '?';
}

function openModal(title, bodyHTML, size) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-overlay').classList.add('active');
  var modal = document.getElementById('modal');
  modal.classList.toggle('modal-lg', size === 'lg');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('active');
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('btn-login');
  const errEl = document.getElementById('login-error');

  if (!email || !password) {
    errEl.textContent = 'Preencha e-mail e senha.';
    errEl.style.display = 'block';
    return;
  }

  showLoading(btn);
  errEl.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errEl.textContent = 'E-mail ou senha incorretos.';
    errEl.style.display = 'block';
    hideLoading(btn, 'Entrar');
    return;
  }

  currentUser = data.user;
  await loadPerfil();
  showApp();
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null;
  currentPerfil = null;
  document.getElementById('app-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
}

async function loadPerfil() {
  const { data } = await sb.from('perfis').select('*').eq('id', currentUser.id).single();
  currentPerfil = data;
}

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await loadPerfil();
    if (currentPerfil) {
      showApp();
      return true;
    }
  }
  document.getElementById('login-screen').classList.add('active');
  return false;
}

function showApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');

  const nome = currentPerfil?.nome || currentUser?.email || 'Usuário';
  document.getElementById('sidebar-user-name').textContent = nome;
  document.getElementById('sidebar-user-role').innerHTML = `<span class="badge badge-${currentPerfil?.perfil || 'usuario'}" style="font-size:10px">${currentPerfil?.perfil === 'admin' ? 'Administrador' : 'Consultor'}</span>`;

  // Oculta admin-only para não-admins
  if (!isAdmin()) {
    document.getElementById('nav-usuarios').style.display = 'none';
    document.getElementById('admin-section').style.display = 'none';
  }

  navigate('dashboard');
}

const PAGE_TITLES = {
  dashboard: 'Dashboard',
  agenda: 'Agenda de Lavagens',
  clientes: 'Clientes',
  veiculos: 'Veículos',
  servicos: 'Serviços',
  pacotes: 'Pacotes',

  usuarios: 'Usuários'
};

function navigate(page) {
  currentPage = page;
  toggleSidebar(false);

  // Atualiza nav ativo
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const navBtns = document.querySelectorAll('.nav-item');
  navBtns.forEach(b => { if (b.textContent.includes(PAGE_TITLES[page]?.split(' ')[0])) b.classList.add('active'); });

  document.getElementById('topbar-title').textContent = PAGE_TITLES[page] || page;
  document.getElementById('topbar-actions').innerHTML = '';

  const pages = {
    dashboard: renderDashboard,
    agenda: renderAgenda,
    clientes: renderClientes,
    veiculos: renderVeiculos,
    servicos: renderServicos,
    pacotes: renderPacotes,
    vendas: renderVendas,
    usuarios: renderUsuarios
  };

  const fn = pages[page];
  if (fn) fn();
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
async function renderDashboard() {
  document.getElementById('page-area').innerHTML = '<div class="empty-state"><span class="spinner" style="border-color:var(--gray-300);border-top-color:var(--brand);width:30px;height:30px"></span></div>';

  var hoje = new Date().toISOString().split('T')[0];
  var mesInicio = hoje.slice(0,7) + '-01';
  var trinta = new Date(Date.now()-30*24*60*60*1000).toISOString();

  var results = await Promise.all([
    sb.from('agendamentos')
      .select('id,status,data_hora,valor_avulso,clientes(nome,telefone),veiculos(placa,modelo),servicos(nome),pacotes_cliente(pacotes(nome))')
      .gte('data_hora', hoje + 'T00:00:00')
      .lte('data_hora', hoje + 'T23:59:59')
      .order('data_hora', { ascending: true }),
    sb.from('pacotes_cliente').select('id,quantidade_total,quantidade_usada').eq('ativo', true),
    sb.from('veiculos').select('id,placa,modelo,ultima_lavagem,clientes(nome,telefone)')
      .not('ultima_lavagem','is',null)
      .lte('ultima_lavagem', trinta)
      .eq('ativo', true)
      .order('ultima_lavagem', { ascending: true })
      .limit(50),
    sb.from('vendas_avulsas').select('valor').gte('data_venda', mesInicio)
  ]);

  var agdHoje     = results[0].data || [];
  var pacAtivos   = results[1].data || [];
  var alertas     = results[2].data || [];
  var vendasMes   = results[3].data || [];

  var concluidos  = agdHoje.filter(function(a){ return a.status === 'concluido'; }).length;
  var pacotesCount = pacAtivos.length;
  var saldoTotal  = pacAtivos.reduce(function(s,p){ return s + (p.quantidade_total - p.quantidade_usada); }, 0);
  var faturamento = vendasMes.reduce(function(s,v){ return s + (v.valor || 0); }, 0);

  // ── Cards KPI
  var kpiHtml =
    '<div class="stats-grid">' +
      '<div class="stat-card">' +
        '<div class="label">Agendamentos hoje</div>' +
        '<div class="value">' + String(agdHoje.length) + '</div>' +
        '<div class="sub">' + String(concluidos) + ' concluído' + (concluidos !== 1 ? 's' : '') + '</div>' +
      '</div>' +
      '<div class="stat-card success">' +
        '<div class="label">Pacotes ativos</div>' +
        '<div class="value">' + String(pacotesCount) + '</div>' +
        '<div class="sub">' + String(saldoTotal) + ' lavagens restantes</div>' +
      '</div>' +
      '<div class="stat-card danger">' +
        '<div class="label">Alertas 30 dias</div>' +
        '<div class="value">' + String(alertas.length) + '</div>' +
        '<div class="sub">veículos sem lavar</div>' +
      '</div>' +
      '<div class="stat-card accent">' +
        '<div class="label">Faturamento avulso (mês)</div>' +
        '<div class="value" style="font-size:18px">' + formatCurrency(faturamento) + '</div>' +
        '<div class="sub">serviços sem pacote</div>' +
      '</div>' +
    '</div>';

  // ── Agendamentos do dia
  var agdRows = '';
  if (agdHoje.length === 0) {
    agdRows = '<div class="empty-state" style="padding:2rem"><div class="icon">📅</div><p>Nenhum agendamento para hoje</p></div>';
  } else {
    agdHoje.forEach(function(a) {
      var hora = a.data_hora ? new Date(a.data_hora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : '--:--';
      var nomeCliente = a.clientes ? a.clientes.nome : '—';
      var tel = a.clientes ? a.clientes.telefone : '';
      var placa = a.veiculos ? a.veiculos.placa : '—';
      var modelo = a.veiculos ? a.veiculos.modelo : '';
      var servico = a.servicos ? a.servicos.nome : (a.pacotes_cliente && a.pacotes_cliente.pacotes ? a.pacotes_cliente.pacotes.nome : '—');
      var valor = a.pacotes_cliente ? 'Pacote' : (a.valor_avulso ? formatCurrency(a.valor_avulso) : '—');

      var acoes = '';
      if (isAdmin() && a.status !== 'concluido' && a.status !== 'cancelado') {
        acoes = '<select class="btn btn-sm btn-ghost" style="padding:.25rem .4rem;font-size:12px" onchange="dashAtualizarStatus(\'' + a.id + '\',this.value)">' +
          '<option value="">Atualizar</option>' +
          '<option value="confirmado">Confirmar</option>' +
          '<option value="em_andamento">Iniciar</option>' +
          '<option value="concluido">Concluir ✓</option>' +
          '<option value="cancelado">Cancelar</option>' +
        '</select>';
      }

      agdRows +=
        '<div class="agenda-item ' + a.status + '" style="grid-template-columns:55px 1fr auto auto">' +
          '<div>' +
            '<div class="agenda-hora">' + hora + '</div>' +
            badgeStatus(a.status) +
          '</div>' +
          '<div class="agenda-info">' +
            '<strong>' + nomeCliente + '</strong>' +
            '<span>' + placa + (modelo ? ' · ' + modelo : '') + ' · ' + servico + '</span>' +
            (tel ? '<span style="font-size:11px;color:var(--gray-600)">' + tel + '</span>' : '') +
          '</div>' +
          '<div style="font-size:12px;color:var(--brand-mid);white-space:nowrap">' + valor + '</div>' +
          '<div>' + acoes + '</div>' +
        '</div>';
    });
  }

  // ── Alertas 30 dias
  var alertasHtml = alertas.length === 0
    ? '<div class="empty-state" style="padding:1.5rem"><p>Nenhum veículo sem lavar há 30+ dias 🎉</p></div>'
    : alertas.slice(0, 6).map(function(a) {
        var dias = diasAtras(a.ultima_lavagem);
        var cli = a.clientes;
        return '<div class="alerta-item">' +
          '<div class="alerta-avatar">' + getInitials(cli ? cli.nome : '?') + '</div>' +
          '<div class="alerta-info">' +
            '<strong>' + (cli ? cli.nome : '—') + '</strong>' +
            '<span>' + a.placa + ' · ' + a.modelo + (cli ? ' · ' + cli.telefone : '') + '</span>' +
            '<span style="display:block;font-size:11px;color:var(--gray-600)">Última lavagem: ' + formatDate(a.ultima_lavagem) + '</span>' +
          '</div>' +
          '<span class="alerta-dias">' + String(dias) + 'd</span>' +
        '</div>';
      }).join('');

  // ── Layout final: 2 colunas no desktop
  document.getElementById('page-area').innerHTML =
    kpiHtml +
    '<div class="dashboard-grid">' +

      // Coluna principal: agendamentos do dia
      '<div class="card">' +
        '<div class="card-header">' +
          '<span class="card-title">📅 Agenda de Hoje</span>' +
          '<div style="display:flex;align-items:center;gap:8px">' +
            '<span style="font-size:12px;color:var(--gray-600)">' + new Date().toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long'}) + '</span>' +
            (isAdmin() ? '<button class="btn btn-sm btn-primary" onclick="navigate(\'agenda\')">Ver agenda completa</button>' : '') +
          '</div>' +
        '</div>' +
        '<div class="agenda-grid">' + agdRows + '</div>' +
      '</div>' +

      // Coluna lateral: alertas 30 dias
      '<div class="card">' +
        '<div class="card-header">' +
          '<span class="card-title">⏰ Retornos pendentes</span>' +
          '<span class="badge badge-cancelado">' + String(alertas.length) + '</span>' +
        '</div>' +
        '<div style="max-height:420px;overflow-y:auto">' + alertasHtml + '</div>' +
        (alertas.length > 6 ? '<div style="padding:.5rem;text-align:center;font-size:12px;color:var(--gray-600)">+ ' + (alertas.length - 6) + ' mais</div>' : '') +
      '</div>' +

    '</div>';
}

async function dashAtualizarStatus(id, status) {
  if (!status) return;
  if (status === 'concluido') {
    var result = await sb.rpc('fn_concluir_agendamento', { p_agendamento_id: id });
    if (result.error) { toast('Erro ao concluir: ' + result.error.message, 'error'); }
    else { toast('Lavagem concluída! Última lavagem atualizada.', 'success'); }
  } else {
    var result = await sb.from('agendamentos').update({ status: status }).eq('id', id);
    if (result.error) { toast('Erro: ' + result.error.message, 'error'); }
    else { toast('Status atualizado!', 'success'); }
  }
  renderDashboard();
}


// ═══════════════════════════════════════════════════════
// AGENDA
// ═══════════════════════════════════════════════════════
let agendaFiltros = { data: new Date().toISOString().split('T')[0], status: '' };

async function renderAgenda() {
  if (isAdmin()) {
    document.getElementById('topbar-actions').innerHTML = `
      <button class="btn btn-primary" onclick="abrirModalAgendamento()">+ Novo Agendamento</button>`;
  }

  document.getElementById('page-area').innerHTML = `
    <div class="card">
      <div class="search-bar">
        <input type="date" id="agenda-data" value="${agendaFiltros.data}" onchange="agendaFiltros.data=this.value;carregarAgendamentos()">
        <input type="text" id="agenda-placa" placeholder="Buscar placa..." oninput="carregarAgendamentos()">
        <select id="agenda-status" onchange="agendaFiltros.status=this.value;carregarAgendamentos()">
          <option value="">Todos os status</option>
          <option value="agendado">Agendado</option>
          <option value="confirmado">Confirmado</option>
          <option value="em_andamento">Em andamento</option>
          <option value="concluido">Concluído</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>
      <div id="agenda-lista"></div>
    </div>`;

  carregarAgendamentos();
}

async function carregarAgendamentos() {
  const data = document.getElementById('agenda-data')?.value || agendaFiltros.data;
  const placa = document.getElementById('agenda-placa')?.value?.toLowerCase() || '';
  const status = document.getElementById('agenda-status')?.value || '';
  const lista = document.getElementById('agenda-lista');
  lista.innerHTML = `<div class="empty-state"><span class="spinner" style="border-color:var(--gray-300);border-top-color:var(--brand)"></span></div>`;

  let q = sb.from('agendamentos')
    .select('id,status,data_hora,valor_avulso,observacoes,clientes(nome,telefone),veiculos(placa,modelo),servicos(nome,preco),pacotes_cliente(id,pacotes(nome))')
    .gte('data_hora', data + 'T00:00:00')
    .lte('data_hora', data + 'T23:59:59')
    .order('data_hora', { ascending: true });

  if (status) q = q.eq('status', status);

  const { data: agds, error } = await q;

  if (error || !agds || agds.length === 0) {
    lista.innerHTML = `<div class="empty-state"><div class="icon">📅</div><p>Nenhum agendamento para esta data</p></div>`;
    return;
  }

  const filtrados = placa ? agds.filter(a => a.veiculos?.placa?.toLowerCase().includes(placa)) : agds;

  if (filtrados.length === 0) {
    lista.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>Nenhum agendamento encontrado</p></div>`;
    return;
  }

  lista.innerHTML = `<div class="agenda-grid">${filtrados.map(a => {
    const hora = a.data_hora ? new Date(a.data_hora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : '--:--';
    const servico = a.pacotes_cliente?.pacotes?.nome || a.servicos?.nome || 'Serviço';
    const valor = a.pacotes_cliente ? 'Pacote' : formatCurrency(a.valor_avulso || a.servicos?.preco || 0);
    const botoesCta = isAdmin() ? `
      <div class="agenda-actions">
        ${a.status !== 'concluido' && a.status !== 'cancelado' ? `
          <select class="btn btn-sm btn-ghost" style="padding:.2rem .4rem" onchange="atualizarStatus('${a.id}', this.value)">
            <option value="">Status</option>
            <option value="confirmado">Confirmar</option>
            <option value="em_andamento">Iniciar</option>
            <option value="concluido">Concluir</option>
            <option value="cancelado">Cancelar</option>
          </select>` : ''}
        <button class="btn btn-sm btn-outline" onclick="editarAgendamento('${a.id}')">✏️</button>
      </div>` : '';
    return `
      <div class="agenda-item ${a.status}">
        <div><div class="agenda-hora">${hora}</div>${badgeStatus(a.status)}</div>
        <div class="agenda-info">
          <strong>${a.clientes?.nome || 'Cliente'}</strong>
          <span>${a.veiculos?.placa || ''} · ${a.veiculos?.modelo || ''} · ${servico}</span>
          <span style="font-size:11px;color:var(--brand-mid)">${valor}</span>
        </div>
        ${botoesCta}
      </div>`;
  }).join('')}</div>`;
}

async function atualizarStatus(id, status) {
  if (!status) return;

  if (status === 'concluido') {
    // Usa a função que debita pacote
    const { error } = await sb.rpc('fn_concluir_agendamento', { p_agendamento_id: id });
    if (error) {
      toast('Erro ao concluir: ' + error.message, 'error');
    } else {
      toast('Lavagem concluída! Última lavagem atualizada.', 'success');
    }
  } else {
    const { error } = await sb.from('agendamentos').update({ status }).eq('id', id);
    if (error) {
      toast('Erro ao atualizar status', 'error');
    } else {
      toast('Status atualizado!', 'success');
    }
  }
  carregarAgendamentos();
}

async function abrirModalAgendamento(agdId = null) {
  const [
    { data: clientes },
    { data: servicos },
  ] = await Promise.all([
    sb.from('clientes').select('id,nome,telefone').eq('ativo', true).order('nome'),
    sb.from('servicos').select('id,nome,preco').eq('ativo', true).order('nome')
  ]);

  let agd = null;
  let veiculos = [];
  let pacotesCliente = [];

  if (agdId) {
    const { data } = await sb.from('agendamentos').select('*').eq('id', agdId).single();
    agd = data;
    if (agd?.cliente_id) {
      const [{ data: vs }, { data: pcs }] = await Promise.all([
        sb.from('veiculos').select('id,placa,modelo').eq('cliente_id', agd.cliente_id).eq('ativo', true),
        sb.from('pacotes_cliente').select('id,pacotes(nome),quantidade_total,quantidade_usada').eq('cliente_id', agd.cliente_id).eq('ativo', true)
      ]);
      veiculos = vs || [];
      pacotesCliente = (pcs || []).filter(function(p){ return p.quantidade_usada < p.quantidade_total; });
    }
  }

  const dataHora = agd?.data_hora ? formatDateForInput(agd.data_hora) : '';

  openModal(agd ? 'Editar Agendamento' : 'Novo Agendamento', `
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label>Cliente *</label>
        <select id="agd-cliente" onchange="onAgdClienteChange(this.value)">
          <option value="">Selecione o cliente</option>
          ${(clientes || []).map(c => `<option value="${c.id}" ${agd?.cliente_id === c.id ? 'selected' : ''}>${c.nome} — ${c.telefone}</option>`).join('')}
        </select>
      </div>
      <div class="form-group" id="agd-veiculo-group">
        <label>Veículo *</label>
        <select id="agd-veiculo">
          <option value="">Selecione primeiro o cliente</option>
          ${veiculos.map(v => `<option value="${v.id}" ${agd?.veiculo_id === v.id ? 'selected' : ''}>${v.placa} — ${v.modelo}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Data e Hora *</label>
        <input type="datetime-local" id="agd-datahora" value="${dataHora}">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Serviço</label>
        <select id="agd-servico">
          <option value="">Sem serviço específico</option>
          ${(servicos || []).map(s => `<option value="${s.id}" ${agd?.servico_id === s.id ? 'selected' : ''}>${s.nome} — ${formatCurrency(s.preco)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Vincular a Pacote do Cliente</label>
        <select id="agd-pacote">
          <option value="">Venda avulsa (sem pacote)</option>
          ' + pacotesCliente.map(function(p){ var sel = agd && agd.pacote_cliente_id === p.id ? ' selected' : ''; var nm = p.pacotes && p.pacotes.nome ? p.pacotes.nome : 'Pacote'; var s = p.quantidade_total - p.quantidade_usada; return '<option value="' + p.id + '"' + sel + '>' + nm + ' (' + s + ' restante' + (s!==1?'s':'') + ')</option>'; }).join('') + '
        </select>
      </div>
      <div class="form-group">
        <label>Valor Avulso (R$)</label>
        <input type="number" id="agd-valor" step="0.01" value="${agd?.valor_avulso || ''}">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Observações</label>
        <textarea id="agd-obs">${agd?.observacoes || ''}</textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarAgendamento('${agdId || ''}')">
        ${agd ? 'Salvar alterações' : 'Agendar'}
      </button>
    </div>`);
}

async function onAgdClienteChange(clienteId) {
  if (!clienteId) return;
  const [{ data: vs }, { data: pcs }] = await Promise.all([
    sb.from('veiculos').select('id,placa,modelo').eq('cliente_id', clienteId).eq('ativo', true),
    sb.from('pacotes_cliente').select('id,pacotes(nome),quantidade_total,quantidade_usada').eq('cliente_id', clienteId).eq('ativo', true)
  ]);
  const vs2 = vs || [];
  const pcs2 = pcs || [];

  document.getElementById('agd-veiculo').innerHTML = `
    <option value="">Selecione o veículo</option>
    ${vs2.map(v => `<option value="${v.id}">${v.placa} — ${v.modelo}</option>`).join('')}`;

  const pcs2Ativos = pcs2.filter(function(p) { return p.quantidade_usada < p.quantidade_total; });
  document.getElementById('agd-pacote').innerHTML = '<option value="">Venda avulsa (sem pacote)</option>' +
    pcs2Ativos.map(function(p) {
      var saldo = p.quantidade_total - p.quantidade_usada;
      var nome = (p.pacotes && p.pacotes.nome) ? p.pacotes.nome : 'Pacote';
      return '<option value="' + p.id + '">' + nome + ' (' + saldo + ' restante' + (saldo !== 1 ? 's' : '') + ')</option>';
    }).join('');
}

async function salvarAgendamento(id) {
  const cliente_id = document.getElementById('agd-cliente').value;
  const veiculo_id = document.getElementById('agd-veiculo').value;
  const data_hora = document.getElementById('agd-datahora').value;
  const servico_id = document.getElementById('agd-servico').value;
  const pacote_cliente_id = document.getElementById('agd-pacote').value;
  const valor_avulso = document.getElementById('agd-valor').value;
  const observacoes = document.getElementById('agd-obs').value;

  if (!cliente_id || !veiculo_id || !data_hora) {
    toast('Preencha cliente, veículo e data/hora', 'error'); return;
  }

  const payload = {
    cliente_id,
    veiculo_id,
    data_hora,
    servico_id: servico_id || null,
    pacote_cliente_id: pacote_cliente_id || null,
    valor_avulso: valor_avulso ? parseFloat(valor_avulso) : null,
    observacoes: observacoes || null,
    criado_por: currentUser.id
  };

  let error;
  if (id) {
    ({ error } = await sb.from('agendamentos').update(payload).eq('id', id));
  } else {
    ({ error } = await sb.from('agendamentos').insert([payload]));
  }

  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast(id ? 'Agendamento atualizado!' : 'Agendamento criado!', 'success');
  closeModal();
  carregarAgendamentos();
}

async function editarAgendamento(id) {
  abrirModalAgendamento(id);
}

// ═══════════════════════════════════════════════════════

async function renderClientes() {
  if (isAdmin()) {
    document.getElementById('topbar-actions').innerHTML = `
      <button class="btn btn-primary" onclick="abrirModalCliente()">+ Novo Cliente</button>`;
  }

  document.getElementById('page-area').innerHTML = `
    <div class="card">
      <div class="search-bar">
        <input type="text" id="cli-busca" placeholder="🔍 Buscar por nome ou telefone..." oninput="carregarClientes()">
      </div>
      <div id="clientes-lista"></div>
    </div>`;
  carregarClientes();
}

async function carregarClientes() {
  const busca = document.getElementById('cli-busca')?.value?.toLowerCase() || '';
  const lista = document.getElementById('clientes-lista');
  lista.innerHTML = `<div class="empty-state"><span class="spinner" style="border-color:var(--gray-300);border-top-color:var(--brand)"></span></div>`;

  let q = sb.from('clientes').select('id,nome,telefone,email,ativo,criado_em').eq('ativo', true).order('nome');
  if (busca) q = q.or(`nome.ilike.%${busca}%,telefone.ilike.%${busca}%`);

  const { data, error } = await q;
  if (!data || data.length === 0) {
    lista.innerHTML = `<div class="empty-state"><div class="icon">👤</div><p>Nenhum cliente encontrado</p></div>`;
    return;
  }

  window._clientesCache = {};
  data.forEach(function(c){ window._clientesCache[c.id] = c; });
  var cliRows = data.map(function(c) {
    var acoes = '<button class="btn btn-sm btn-outline" onclick=\"verCliente(\'' + c.id + '\')">Ver</button>';
    if (isAdmin()) {
      acoes += ' <button class="btn btn-sm btn-ghost" onclick=\"abrirModalCliente(\'' + c.id + '\')">✏️</button>';
      acoes += ' <button class="btn btn-sm btn-ghost" style="color:var(--danger)" onclick=\"excluirCliente(\'' + c.id + '\')">🗑️</button>';
    }
    return '<tr>' +
      '<td data-label="Nome"><strong>' + c.nome + '</strong></td>' +
      '<td data-label="Telefone">' + c.telefone + '</td>' +
      '<td data-label="E-mail">' + (c.email || '—') + '</td>' +
      '<td data-label="Cadastro">' + formatDate(c.criado_em) + '</td>' +
      '<td style="white-space:nowrap">' + acoes + '</td>' +
      '</tr>';
  }).join('');
  lista.innerHTML = '<div class="table-wrap"><table>' +
    '<thead><tr><th>Nome</th><th>Telefone</th><th>E-mail</th><th>Cadastro</th><th></th></tr></thead>' +
    '<tbody>' + cliRows + '</tbody>' +
  '</table></div>';
}

async function abrirModalCliente(id = null) {
  let c = null;
  if (id) {
    const { data } = await sb.from('clientes').select('*').eq('id', id).single();
    c = data;
  }

  openModal(c ? 'Editar Cliente' : 'Novo Cliente', `
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label>Nome completo *</label>
        <input type="text" id="cli-nome" value="${c?.nome || ''}">
      </div>
      <div class="form-group">
        <label>Telefone / WhatsApp *</label>
        <input type="tel" id="cli-telefone" value="${c?.telefone || ''}">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="cli-email" value="${c?.email || ''}">
      </div>
      <div class="form-group">
        <label>CPF</label>
        <input type="text" id="cli-cpf" value="${c?.cpf || ''}">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Observações</label>
        <textarea id="cli-obs">${c?.observacoes || ''}</textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarCliente('${id || ''}')">
        ${c ? 'Salvar' : 'Cadastrar'}
      </button>
    </div>`);
}

async function salvarCliente(id) {
  const nome = document.getElementById('cli-nome').value.trim();
  const telefone = document.getElementById('cli-telefone').value.trim();
  const email = document.getElementById('cli-email').value.trim();
  const cpf = document.getElementById('cli-cpf').value.trim();
  const observacoes = document.getElementById('cli-obs').value.trim();

  if (!nome || !telefone) { toast('Nome e telefone são obrigatórios', 'error'); return; }

  const payload = { nome, telefone, email: email || null, cpf: cpf || null, observacoes: observacoes || null };
  let error;
  if (id) {
    ({ error } = await sb.from('clientes').update(payload).eq('id', id));
  } else {
    ({ error } = await sb.from('clientes').insert([payload]));
  }

  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast(id ? 'Cliente atualizado!' : 'Cliente cadastrado!', 'success');
  closeModal();
  carregarClientes();
}

async function verCliente(id) {
  // Carrega todos os dados do cliente em paralelo
  const [
    { data: c },
    { data: vs },
    { data: agds },
    { data: pcs },
    { data: vendas }
  ] = await Promise.all([
    sb.from('clientes').select('*').eq('id', id).single(),
    sb.from('veiculos').select('*').eq('cliente_id', id).order('criado_em', { ascending: false }),
    sb.from('agendamentos')
      .select('id,status,data_hora,data_conclusao,valor_avulso,observacoes,servicos(nome,preco),veiculos(placa,modelo),pacotes_cliente(id,ativo,pacotes(nome))')
      .eq('cliente_id', id)
      .order('data_hora', { ascending: false })
      .limit(50),
    sb.from('pacotes_cliente').select('id,pacotes(nome),quantidade_total,quantidade_usada,valor_pago,ativo,data_compra,data_vencimento').eq('cliente_id', id).order('data_compra', { ascending: false }),
    sb.from('vendas_avulsas').select('id,valor,descricao,data_venda,servicos(nome)').eq('cliente_id', id).order('data_venda', { ascending: false }).limit(30)
  ]);

  // ── Estatísticas calculadas
  var agdList    = agds   || [];
  var vcList     = vs     || [];
  var pcList     = pcs    || [];
  var vendList   = vendas || [];
  var totalLavagens  = agdList.filter(function(a){
    if (a.status !== 'concluido') return false;
    // Se vinculado a pacote cancelado, não conta como lavagem realizada válida
    if (a.pacotes_cliente && a.pacotes_cliente.ativo === false) return false;
    return true;
  }).length;
  var totalGasto     = agdList
    .filter(function(a){ return a.status === 'concluido' && a.valor_avulso; })
    .reduce(function(s,a){ return s + (a.valor_avulso || 0); }, 0)
    + vendList.reduce(function(s,v){ return s + (v.valor || 0); }, 0)
    + pcList.filter(function(p){ return p.ativo; }).reduce(function(s,p){ return s + (p.valor_pago || 0); }, 0);
  var pacotesAtivos  = pcList.filter(function(p){ return p.ativo && (p.quantidade_total - p.quantidade_usada) > 0; }).length;

  // ── Serviços mais usados
  var servicoCount = {};
  agdList.filter(function(a){ return a.status === 'concluido' && a.servicos; }).forEach(function(a){
    var nome = a.servicos.nome;
    servicoCount[nome] = (servicoCount[nome] || 0) + 1;
  });
  var topServicos = Object.keys(servicoCount).sort(function(a,b){ return servicoCount[b] - servicoCount[a]; }).slice(0,3);

  // ── Monta veículos HTML
  var veiculosHtml = vcList.length === 0
    ? '<p style="font-size:13px;color:var(--gray-600)">Nenhum veículo cadastrado</p>'
    : vcList.map(function(v) {
        var dias = diasAtras(v.ultima_lavagem);
        var badge = v.ultima_lavagem
          ? '<span class="badge ' + (dias >= 30 ? 'badge-cancelado' : 'badge-concluido') + '">' + dias + 'd atrás</span>'
          : '<span style="font-size:11px;color:var(--gray-400)">Nunca lavado</span>';
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:.6rem 0;border-bottom:1px solid var(--gray-100)">' +
          '<div>' +
            '<strong>' + v.placa + '</strong> <span style="color:var(--gray-600)">· ' + v.modelo + (v.marca ? ' ' + v.marca : '') + (v.cor ? ' · ' + v.cor : '') + '</span>' +
            '<div style="font-size:11px;color:var(--gray-600);margin-top:2px">Última lavagem: ' + (v.ultima_lavagem ? formatDate(v.ultima_lavagem) : '—') + '</div>' +
          '</div>' +
          badge +
        '</div>';
      }).join('');

  // ── Monta pacotes HTML
  var pacotesHtml = pcList.length === 0
    ? '<p style="font-size:13px;color:var(--gray-600)">Nenhum pacote adquirido</p>'
    : pcList.map(function(p) {
        var saldo = p.quantidade_total - p.quantidade_usada;
        var pct   = Math.round(p.quantidade_usada / p.quantidade_total * 100);
        var statusBadge = !p.ativo
          ? '<span class="badge badge-cancelado">Cancelado</span>'
          : saldo > 0
            ? '<span class="badge badge-confirmado">' + saldo + ' restante' + (saldo !== 1 ? 's' : '') + '</span>'
            : '<span class="badge badge-cancelado">Zerado</span>';
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:.6rem;background:var(--gray-50);border-radius:8px;margin-bottom:.35rem' + (!p.ativo ? ';opacity:.6' : '') + '">' +
          '<div>' +
            '<strong style="font-size:13px">' + (p.pacotes ? p.pacotes.nome : 'Pacote') + '</strong>' +
            '<div style="font-size:12px;color:var(--gray-600)">' + formatCurrency(p.valor_pago) + ' · Compra: ' + formatDate(p.data_compra) + (p.data_vencimento ? ' · Vence: ' + formatDate(p.data_vencimento) : '') + '</div>' +
            '<div style="display:flex;align-items:center;gap:6px;margin-top:4px">' +
              '<div style="width:80px;height:5px;background:var(--gray-200);border-radius:99px;overflow:hidden">' +
                '<div style="width:' + pct + '%;height:100%;background:var(--brand)"></div>' +
              '</div>' +
              '<span style="font-size:11px;color:var(--gray-600)">' + p.quantidade_usada + '/' + p.quantidade_total + ' lavagens usadas</span>' +
            '</div>' +
          '</div>' +
          statusBadge +
        '</div>';
      }).join('');

  // ── Monta histórico de lavagens (agendamentos concluídos + vendas avulsas juntos)
  var historico = [];
  agdList.forEach(function(a) {
    var pacoteCancelado = a.pacotes_cliente && a.pacotes_cliente.ativo === false;
    var nomePacote = a.pacotes_cliente && a.pacotes_cliente.pacotes ? a.pacotes_cliente.pacotes.nome : null;
    historico.push({
      data: a.data_conclusao || a.data_hora,
      tipo: 'agendamento',
      status: a.status,
      pacoteCancelado: pacoteCancelado,
      servico: a.servicos ? a.servicos.nome : (nomePacote || '—'),
      placa: a.veiculos ? a.veiculos.placa : '—',
      modelo: a.veiculos ? a.veiculos.modelo : '',
      valor: a.valor_avulso || (a.servicos ? a.servicos.preco : null),
      origem: a.pacotes_cliente ? ('Pacote' + (pacoteCancelado ? ' (cancelado)' : '')) : 'Avulso'
    });
  });
  vendList.forEach(function(v) {
    historico.push({
      data: v.data_venda,
      tipo: 'venda',
      status: 'concluido',
      servico: v.servicos ? v.servicos.nome : (v.descricao || 'Serviço avulso'),
      placa: '—',
      modelo: '',
      valor: v.valor,
      origem: 'Venda direta'
    });
  });
  historico.sort(function(a,b){ return new Date(b.data) - new Date(a.data); });

  var historicoHtml = historico.length === 0
    ? '<div class="empty-state" style="padding:1.5rem"><p>Nenhuma lavagem registrada</p></div>'
    : '<div class="table-wrap"><table>' +
        '<thead><tr><th>Data</th><th>Veículo</th><th>Serviço</th><th>Tipo</th><th>Valor</th><th>Status</th></tr></thead>' +
        '<tbody>' +
        historico.map(function(h) {
          var rowStyle = h.pacoteCancelado ? ' style="opacity:.5"' : '';
          var origemStyle = h.pacoteCancelado
            ? 'font-size:11px;background:var(--danger-light);padding:2px 7px;border-radius:99px;color:var(--danger)'
            : 'font-size:11px;background:var(--gray-100);padding:2px 7px;border-radius:99px;color:var(--gray-700)';
          var statusCell = h.pacoteCancelado
            ? '<span class="badge badge-cancelado">Pacote cancelado</span>'
            : badgeStatus(h.status);
          return '<tr' + rowStyle + '>' +
            '<td style="white-space:nowrap">' + formatDate(h.data) + '</td>' +
            '<td><strong>' + h.placa + '</strong><div style="font-size:11px;color:var(--gray-600)">' + h.modelo + '</div></td>' +
            '<td>' + h.servico + '</td>' +
            '<td><span style="' + origemStyle + '">' + h.origem + '</span></td>' +
            '<td>' + (h.valor ? formatCurrency(h.valor) : '—') + '</td>' +
            '<td>' + statusCell + '</td>' +
          '</tr>';
        }).join('') +
        '</tbody></table></div>';

  // ── Monta top serviços
  var topServicosHtml = topServicos.length === 0
    ? '<span style="font-size:12px;color:var(--gray-600)">—</span>'
    : topServicos.map(function(s) {
        return '<span style="font-size:12px;background:var(--brand-light);color:var(--brand);padding:3px 10px;border-radius:99px;margin-right:4px">' + s + ' ×' + servicoCount[s] + '</span>';
      }).join('');

  // ── Monta modal com abas
  var nomeCliente = c ? c.nome : 'Cliente';
  var modalHtml =
    // Layout 2 colunas: esquerda = info cliente, direita = KPIs
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem;align-items:start">' +

      // Coluna esquerda: dados do cliente
      '<div style="background:var(--gray-50);border-radius:10px;padding:1rem">' +
        '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-600);margin-bottom:.6rem">Dados do Cliente</div>' +
        '<div style="display:flex;flex-direction:column;gap:6px;font-size:13px">' +
          '<div><span style="color:var(--gray-600)">Telefone: </span><strong>' + (c ? c.telefone : '—') + '</strong></div>' +
          '<div><span style="color:var(--gray-600)">E-mail: </span>' + (c && c.email ? c.email : '—') + '</div>' +
          '<div><span style="color:var(--gray-600)">CPF: </span>' + (c && c.cpf ? c.cpf : '—') + '</div>' +
          '<div><span style="color:var(--gray-600)">Cliente desde: </span>' + (c ? formatDate(c.criado_em) : '—') + '</div>' +
          (topServicos.length > 0 ? '<div style="margin-top:4px"><span style="color:var(--gray-600);display:block;margin-bottom:4px">Serviços favoritos:</span>' + topServicosHtml + '</div>' : '') +
        '</div>' +
      '</div>' +

      // Coluna direita: KPIs em grid 2x2
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
        '<div class="stat-card" style="padding:.75rem">' +
          '<div class="label">Lavagens concluídas</div>' +
          '<div class="value" style="font-size:22px">' + totalLavagens + '</div>' +
        '</div>' +
        '<div class="stat-card" style="padding:.75rem">' +
          '<div class="label">Pacotes ativos</div>' +
          '<div class="value" style="font-size:22px;color:var(--success)">' + String(pacotesAtivos) + '</div>' +
        '</div>' +
        '<div class="stat-card" style="padding:.75rem;grid-column:1/-1">' +
          '<div class="label">Total investido (pacotes + avulsos)</div>' +
          '<div class="value" style="font-size:20px;color:var(--accent)">' + formatCurrency(totalGasto) + '</div>' +
        '</div>' +
      '</div>' +

    '</div>' +

    // Abas
    '<div style="display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:1rem" id="hist-tabs">' +
      '<button class="hist-tab active" data-tab="historico" onclick="switchHistTab(this,\'historico\')" style="background:none;border:none;padding:.5rem 1rem;font-size:13px;font-weight:600;color:var(--brand);border-bottom:2px solid var(--brand);margin-bottom:-2px;cursor:pointer">📋 Histórico (' + historico.length + ')</button>' +

        (isAdmin() ? '<button class="btn btn-sm btn-primary" onclick="closeModal();navigate(\'veiculos\');setTimeout(function(){abrirModalVeiculo(null,\'' + id + '\')},300)">+ Veículo</button>' : '') +
      '</div>' +
      veiculosHtml +
    '</div>' +
    '<div id="tab-pacotes" style="display:none">' + pacotesHtml + '</div>';

  openModal('Histórico: ' + nomeCliente, modalHtml, 'lg');
}

function switchHistTab(btn, tab) {
  // Desativa todas as abas
  document.querySelectorAll('.hist-tab').forEach(function(b) {
    b.style.color = 'var(--gray-600)';
    b.style.fontWeight = '500';
    b.style.borderBottom = 'none';
  });
  // Ativa a aba clicada
  btn.style.color = 'var(--brand)';
  btn.style.fontWeight = '600';
  btn.style.borderBottom = '2px solid var(--brand)';
  btn.style.marginBottom = '-2px';
  // Esconde todos os conteúdos
  ['historico','veiculos','pacotes'].forEach(function(t) {
    var el = document.getElementById('tab-' + t);
    if (el) el.style.display = 'none';
  });
  // Mostra o selecionado
  var target = document.getElementById('tab-' + tab);
  if (target) target.style.display = 'block';
}

  }

  carregarVeiculos();

async function carregarVeiculos() {
  const busca = document.getElementById('vei-busca')?.value?.toLowerCase() || '';
  const lista = document.getElementById('veiculos-lista');
  lista.innerHTML = `<div class="empty-state"><span class="spinner" style="border-color:var(--gray-300);border-top-color:var(--brand)"></span></div>`;

  let q = sb.from('veiculos').select('id,placa,modelo,marca,cor,ultima_lavagem,ativo,clientes(nome,telefone)').eq('ativo', true).order('placa');
  if (busca) q = q.or(`placa.ilike.%${busca}%,modelo.ilike.%${busca}%`);

  const { data, error } = await q;
  if (!data || data.length === 0) {
    lista.innerHTML = `<div class="empty-state"><div class="icon">🚗</div><p>Nenhum veículo encontrado</p></div>`;
    return;
  }

  window._veiculosCache = {};
  data.forEach(function(v){ window._veiculosCache[v.id] = v; });
  var veiRows = data.map(function(v) {
    var dias = diasAtras(v.ultima_lavagem);
    var alertaDias = dias !== null && dias >= 30
      ? '<span class="badge badge-cancelado">' + dias + 'd</span>'
      : (dias !== null ? '<span class="badge badge-concluido">' + dias + 'd</span>'
                       : '<span style="color:var(--gray-600);font-size:12px">Nunca</span>');
    var nomeCliente = v.clientes && v.clientes.nome ? v.clientes.nome : '—';
    var marca = v.marca || '';
    var cor = v.cor ? '· ' + v.cor : '';
    var acoes = '';
    if (isAdmin()) {
      acoes = '<button class="btn btn-sm btn-ghost" onclick=\"abrirModalVeiculo(\'' + v.id + '\')">✏️</button>' +
              ' <button class="btn btn-sm btn-ghost" style="color:var(--danger)" onclick=\"excluirVeiculo(\'' + v.id + '\')">🗑️</button>';
    }
    return '<tr>' +
      '<td data-label="Placa"><strong>' + v.placa + '</strong></td>' +
      '<td data-label="Modelo">' + v.modelo + ' ' + marca + ' ' + cor + '</td>' +
      '<td data-label="Cliente">' + nomeCliente + '</td>' +
      '<td data-label="Última lavagem">' + formatDate(v.ultima_lavagem) + ' ' + alertaDias + '</td>' +
      '<td style="white-space:nowrap">' + acoes + '</td>' +
      '</tr>';
  }).join('');
  lista.innerHTML = '<div class="table-wrap"><table>' +
    '<thead><tr><th>Placa</th><th>Modelo/Marca</th><th>Cliente</th><th>Última Lavagem</th><th></th></tr></thead>' +
    '<tbody>' + veiRows + '</tbody>' +
  '</table></div>';
}

async function salvarVeiculo(id) {
  const cliente_id = document.getElementById('vei-cliente').value;
  const placa = document.getElementById('vei-placa').value.trim().toUpperCase();
  const modelo = document.getElementById('vei-modelo').value.trim();
  const marca = document.getElementById('vei-marca').value.trim();
  const cor = document.getElementById('vei-cor').value.trim();
  const ano = document.getElementById('vei-ano').value;

  if (!cliente_id || !placa || !modelo) { toast('Cliente, placa e modelo são obrigatórios', 'error'); return; }

  const payload = { cliente_id, placa, modelo, marca: marca || null, cor: cor || null, ano: ano ? parseInt(ano) : null };
  let error;
  if (id) {
    ({ error } = await sb.from('veiculos').update(payload).eq('id', id));
  } else {
    ({ error } = await sb.from('veiculos').insert([payload]));
  }

  if (error) { toast('Erro: ' + (error.message?.includes('unique') ? 'Placa já cadastrada' : error.message), 'error'); return; }
  toast(id ? 'Veículo atualizado!' : 'Veículo cadastrado!', 'success');
  closeModal();
  carregarVeiculos();
}

            </div>
          </div>`).join('')}
      </div>`;

  // Armazena pacotes para uso nos handlers (evita problemas de aspas no onclick)
  window._pacotesVendidosCache = {};
  (vendas || []).forEach(function(v){ window._pacotesVendidosCache[v.id] = v; });

  var pVendasRows = '';
  if (!vendas || vendas.length === 0) {
    pVendasRows = null;
  } else {
    vendas.forEach(function(v) {
      var saldo = v.quantidade_total - v.quantidade_usada;
      var pct = Math.round(v.quantidade_usada / v.quantidade_total * 100);
      var nomeCliente = (v.clientes && v.clientes.nome) ? v.clientes.nome : '—';
      var telCliente  = (v.clientes && v.clientes.telefone) ? v.clientes.telefone : '';
      var nomePacote  = (v.pacotes  && v.pacotes.nome)  ? v.pacotes.nome  : '—';
      var statusBadge, acaoBtn;

      if (!v.ativo) {
        statusBadge = '<span class="badge badge-cancelado">Cancelado</span>';
        acaoBtn = '';
      } else if (saldo <= 0) {
        statusBadge = '<span class="badge badge-cancelado">Zerado</span>';
        acaoBtn = isAdmin() ? '<button class="btn btn-sm btn-ghost" style="color:var(--danger)" onclick=\"cancelarPacote_cache(\'' + v.id + '\')">Cancelar</button>' : '';
      } else {
        statusBadge = '<span class="badge badge-confirmado">' + saldo + ' restante' + (saldo !== 1 ? 's' : '') + '</span>';
        acaoBtn = isAdmin() ? '<button class="btn btn-sm btn-ghost" style="color:var(--danger)" onclick=\"cancelarPacote_cache(\'' + v.id + '\')">Cancelar</button>' : '';
      }

      var rowStyle = !v.ativo ? ' style="opacity:.55"' : '';
      pVendasRows +=
        '<tr' + rowStyle + '>' +
        '<td data-label="Cliente"><strong>' + nomeCliente + '</strong><div style="font-size:11px;color:var(--gray-600)">' + telCliente + '</div></td>' +

            '<div style="width:' + pct + '%;height:100%;background:var(--brand)"></div>' +
          '</div>' +
          '<span style="font-size:12px">' + v.quantidade_usada + '/' + v.quantidade_total + '</span>' +
        '</div></td>' +
        '<td>' + formatCurrency(v.valor_pago) + '</td>' +
        '<td>' + formatDate(v.data_compra) + '</td>' +
        '<td>' + statusBadge + '</td>' +
        '<td>' + acaoBtn + '</td>' +
        '</tr>';
    });

  var pVendas = pVendasRows === null
    ? '<div class="empty-state"><p>Nenhum pacote vendido ainda</p></div>'
    : '<div class="table-wrap"><table>' +
        '<thead><tr><th>Cliente</th><th>Pacote</th><th>Uso</th><th>Valor</th><th>Compra</th><th>Status</th><th></th></tr></thead>' +
        '<tbody>' + pVendasRows + '</tbody>' +
      '</table></div>';

  document.getElementById('page-area').innerHTML = `
    <div class="card">
      <div class="card-header"><span class="card-title">📦 Templates de Pacotes</span></div>
      ${pTemplates}
    </div>

      <div class="card-header"><span class="card-title">💳 Pacotes Vendidos</span></div>

function onVpPacoteChange(sel) {
  const opt = sel.options[sel.selectedIndex];
  document.getElementById('vp-valor').value = opt.dataset.valor || '';
  if (opt.dataset.validade) {
    const d = new Date();
    d.setDate(d.getDate() + parseInt(opt.dataset.validade));
    document.getElementById('vp-venc').value = d.toISOString().split('T')[0];
  }
}

async function salvarVendaPacote() {
  const cliente_id = document.getElementById('vp-cliente').value;
  const pacote_id = document.getElementById('vp-pacote').value;
  const valor = parseFloat(document.getElementById('vp-valor').value);
  const vencimento = document.getElementById('vp-venc').value;
  const obs = document.getElementById('vp-obs').value.trim();

  if (!cliente_id || !pacote_id || isNaN(valor)) { toast('Preencha cliente, pacote e valor', 'error'); return; }

  const { data: pkt } = await sb.from('pacotes').select('quantidade_lavagens').eq('id', pacote_id).single();

  const { error } = await sb.from('pacotes_cliente').insert([{
    cliente_id,
    pacote_id,
    valor_pago: valor,
    quantidade_total: pkt.quantidade_lavagens,
    quantidade_usada: 0,
    data_vencimento: vencimento ? new Date(vencimento).toISOString() : null,
    observacoes: obs || null
  }]);

  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast('Pacote vendido com sucesso!', 'success');
  closeModal();
  renderPacotes();
}

function cancelarPacote_cache(id) {
  var v = window._pacotesVendidosCache[id];
  if (!v) return;
  var clienteNome = (v.clientes && v.clientes.nome) ? v.clientes.nome : 'Cliente';
  var pacoteNome  = (v.pacotes  && v.pacotes.nome)  ? v.pacotes.nome  : 'Pacote';
  cancelarPacote(id, clienteNome, pacoteNome);
}

async function cancelarPacote(id, clienteNome, pacoteNome) {
  window._pendingDeleteId = id;
  openModal('Cancelar Pacote', '' +
    '<div style="background:var(--danger-light);border:1px solid #F5C2C0;border-radius:8px;padding:1rem;margin-bottom:1.25rem">' +
      '<p style="font-size:14px;color:var(--danger);font-weight:600;margin-bottom:4px">&#9888;&#65039; Atencao: esta acao nao pode ser desfeita.</p>' +
      '<p style="font-size:13px;color:var(--gray-700)">Voce esta prestes a cancelar o pacote <strong>' + pacoteNome + '</strong> do cliente <strong>' + clienteNome + '</strong>.</p>' +
    '</div>' +
    '<p style="font-size:13px;color:var(--gray-700);margin-bottom:1.25rem">As lavagens ja utilizadas sao mantidas no historico. O saldo restante sera zerado.</p>' +
    '<div class="form-group" style="margin-bottom:1.25rem">' +
      '<label>Motivo do cancelamento (opcional)</label>' +
      '<textarea id="cancel-motivo" placeholder="Ex: Cliente desistiu, cobranca indevida..." style="min-height:70px"></textarea>' +
    '</div>' +
    '<div class="form-actions">' +
      '<button class="btn btn-ghost" onclick="closeModal()">Voltar</button>' +
      '<button class="btn btn-danger" onclick="confirmarCancelamentoPacote()">Confirmar cancelamento</button>' +
    '</div>'
  );
}

async function confirmarCancelamentoPacote() {
  var id = window._pendingDeleteId;
  const motivo = document.getElementById('cancel-motivo')?.value?.trim() || null;
  const btn = document.querySelector('.btn-danger');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Cancelando...'; }

  const { error } = await sb.from('pacotes_cliente').update({
    ativo: false,
    quantidade_usada: 0,
    observacoes: motivo ? ('CANCELADO: ' + motivo) : 'CANCELADO pelo gestor'
  }).eq('id', id);

  if (error) {
    toast('Erro ao cancelar: ' + error.message, 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = 'Confirmar cancelamento'; }
    return;
  }

  toast('Pacote cancelado com sucesso.', 'success');
  closeModal();
  renderPacotes();
}

async function renderVendas() {
  if (isAdmin()) {
    document.getElementById('topbar-actions').innerHTML = `
      <button class="btn btn-primary" onclick="abrirModalVendaAvulsa()">+ Nova Venda</button>`;
  }

  const { data: vendas } = await sb
    .from('vendas_avulsas')
    .select('id,valor,descricao,data_venda,observacoes,clientes(nome),veiculos(placa),servicos(nome)')
    .order('data_venda', { ascending: false })
    .limit(50);

  const total = (vendas||[]).reduce((s,v) => s + (v.valor||0), 0);

  const html = !vendas || vendas.length === 0
    ? `<div class="empty-state"><div class="icon">💰</div><p>Nenhuma venda avulsa registrada</p></div>`
    : (function() {
        window._vendasCache = {};
        vendas.forEach(function(v){ window._vendasCache[v.id] = v; });
        var rows = vendas.map(function(v) {
          var btn = isAdmin() ? '<button class="btn btn-sm btn-ghost" style="color:var(--danger)" onclick=\"excluirVendaAvulsa(\'' + v.id + '\')">Excluir</button>' : '';
          var nomeCliente = v.clientes && v.clientes.nome ? v.clientes.nome : '—';
          var nomeServico = v.servicos && v.servicos.nome ? v.servicos.nome : '—';
          return '<tr>' +
            '<td data-label="Data">' + formatDate(v.data_venda) + '</td>' +
            '<td data-label="Cliente">' + nomeCliente + '</td>' +
            '<td data-label="Serviço">' + nomeServico + '</td>' +
            '<td data-label="Descrição">' + (v.descricao || '—') + '</td>' +
            '<td data-label="Valor"><strong>' + formatCurrency(v.valor) + '</strong></td>' +
            '<td>' + btn + '</td>' +
            '</tr>';
        }).join('');
        return '<div class="table-wrap"><table>' +
          '<thead><tr><th>Data</th><th>Cliente</th><th>Serviço</th><th>Descrição</th><th>Valor</th><th></th></tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
          '<tfoot><tr style="font-weight:600;background:var(--gray-50)">' +
            '<td colspan="5">Total (últimas 50)</td>' +
            '<td>' + formatCurrency(total) + '</td>' +
          '</tr></tfoot>' +
        '</table></div>';
      })();

  document.getElementById('page-area').innerHTML = `<div class="card">${html}</div>`;
}

    sb.from('servicos').select('id,nome,preco').eq('ativo', true).order('nome')
  ]);

  openModal('Nova Venda Avulsa', `
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label>Cliente *</label>
        <select id="va-cliente" onchange="carregarVeiculosCliente(this.value,'va-veiculo')">
          <option value="">Selecione o cliente</option>
          ${(clientes||[]).map(c => `<option value="${c.id}">${c.nome}</option>`).join('')}
        </select>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Veículo</label>
        <select id="va-veiculo">
          <option value="">Selecione primeiro o cliente</option>
        </select>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Serviço</label>
        <select id="va-servico" onchange="const p=this.options[this.selectedIndex].dataset.preco;if(p)document.getElementById('va-valor').value=p">
          <option value="">Sem serviço específico</option>
          ${(servicos||[]).map(s => `<option value="${s.id}" data-preco="${s.preco}">${s.nome} — ${formatCurrency(s.preco)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Valor (R$) *</label>
        <input type="number" id="va-valor" step="0.01">
      </div>
      <div class="form-group">
        <label>Data da Venda</label>
        <input type="date" id="va-data" value="${new Date().toISOString().split('T')[0]}">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Descrição</label>
        <input type="text" id="va-desc" placeholder="Ex: Polimento extra">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Observações</label>
        <textarea id="va-obs"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarVendaAvulsa()">Registrar Venda</button>
    </div>`);
}

async function carregarVeiculosCliente(clienteId, selectId) {
  if (!clienteId) return;
  const { data: vs } = await sb.from('veiculos').select('id,placa,modelo').eq('cliente_id', clienteId).eq('ativo', true);
  document.getElementById(selectId).innerHTML = `
    <option value="">Selecione o veículo</option>
    ${(vs||[]).map(v => `<option value="${v.id}">${v.placa} — ${v.modelo}</option>`).join('')}`;
}

async function salvarVendaAvulsa() {
  const cliente_id = document.getElementById('va-cliente').value;
  const veiculo_id = document.getElementById('va-veiculo').value;
  const servico_id = document.getElementById('va-servico').value;
  const valor = parseFloat(document.getElementById('va-valor').value);
  const data_venda = document.getElementById('va-data').value;
  const descricao = document.getElementById('va-desc').value.trim();
  const observacoes = document.getElementById('va-obs').value.trim();

  if (!cliente_id || isNaN(valor)) { toast('Cliente e valor são obrigatórios', 'error'); return; }

  const { error } = await sb.from('vendas_avulsas').insert([{
    cliente_id,
    veiculo_id: veiculo_id || null,
    servico_id: servico_id || null,
    valor,
    data_venda: data_venda ? new Date(data_venda).toISOString() : new Date().toISOString(),
    descricao: descricao || null,
    observacoes: observacoes || null
  }]);

  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast('Venda registrada!', 'success');
  closeModal();
  renderVendas();
}

async function renderUsuarios() {
  if (!isAdmin()) {
    document.getElementById('page-area').innerHTML = '<div class="empty-state"><div class="icon">🔒</div><p>Acesso restrito a administradores</p></div>';
    return;
  }

  document.getElementById('topbar-actions').innerHTML =
    '<button class="btn btn-primary" onclick="abrirModalNovoUsuario()">+ Novo Usuário</button>';

  await carregarUsuarios();
}

async function carregarUsuarios() {
  const { data: usuarios } = await sb.from('perfis').select('*').order('nome');

  // Guarda dados para uso nos handlers dos botões
  window._usuariosCache = {};
  (usuarios || []).forEach(function(u) { window._usuariosCache[u.id] = u; });

  var rows = '';
  if (!usuarios || usuarios.length === 0) {
    rows = '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--gray-600)">Nenhum usuário encontrado</td></tr>';
  } else {
    usuarios.forEach(function(u) {
      var isYou = u.id === currentUser.id;
      var acoes = '';
      if (isYou) {
        acoes = '<span style="font-size:11px;color:var(--gray-400)">você</span>';
      } else {
        acoes = '<button class="btn btn-sm btn-outline" onclick="abrirModalEditarUsuario_fromCache(\'' + u.id + '\')">Editar</button> ';
        if (u.ativo) {
          acoes += '<button class="btn btn-sm btn-ghost" style="color:var(--danger)" onclick="toggleUsuarioAtivo(\'' + u.id + '\',false)">Desativar</button>';
        } else {
          acoes += '<button class="btn btn-sm btn-ghost" style="color:var(--success)" onclick="toggleUsuarioAtivo(\'' + u.id + '\',true)">Ativar</button>';
        }
      }
      var perfilLabel = u.perfil === 'admin' ? 'Administrador' : 'Consultor';
      var statusClass = u.ativo ? 'badge-confirmado' : 'badge-cancelado';
      var statusLabel = u.ativo ? 'Ativo' : 'Inativo';
      rows += '<tr>' +
        '<td><strong>' + u.nome + '</strong></td>' +
        '<td>' + u.email + '</td>' +
        '<td><span class="badge badge-' + u.perfil + '">' + perfilLabel + '</span></td>' +
        '<td><span class="badge ' + statusClass + '">' + statusLabel + '</span></td>' +
        '<td style="white-space:nowrap">' + acoes + '</td>' +
        '</tr>';
    });
  }

  var total = usuarios ? usuarios.length : 0;
  document.getElementById('page-area').innerHTML =
    '<div class="card">' +
      '<div class="card-header">' +
        '<span class="card-title">&#128101; Usuários do Sistema</span>' +
        '<span style="font-size:12px;color:var(--gray-600)">' + total + ' usuário(s)</span>' +
      '</div>' +
      '<div class="table-wrap"><table>' +
        '<thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Status</th><th>Ações</th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table></div>' +
    '</div>';
}

function abrirModalEditarUsuario_fromCache(id) {
  var u = window._usuariosCache[id];
  if (!u) return;
  abrirModalEditarUsuario(u.id, u.nome, u.perfil, u.ativo);
}
