function toggleSenhaVisivel() {
  var inp = document.getElementById('nu-senha');
  var btn = document.getElementById('btn-toggle-senha');
  if (!inp) return;
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.innerHTML = '&#128064;';
  } else {
    inp.type = 'password';
    btn.innerHTML = '&#128065;';
  }
}

async function criarUsuario() {
  var nome   = document.getElementById('nu-nome').value.trim();
  var email  = document.getElementById('nu-email').value.trim();
  var senha  = document.getElementById('nu-senha').value;
  var perfil = document.getElementById('nu-perfil').value;

  if (!nome)           { toast('Informe o nome', 'error'); return; }
  if (!email)          { toast('Informe o e-mail', 'error'); return; }
  if (senha.length < 6){ toast('Senha deve ter no minimo 6 caracteres', 'error'); return; }

  var btn = document.getElementById('btn-criar-usuario');
  var originalText = btn ? btn.innerHTML : 'Criar Usuário';
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Criando...'; }

  // Cria via signUp — funciona sem confirmação de e-mail quando
  // "Confirm email" está desabilitado no Supabase (Authentication > Providers > Email)
  var signUpData = await sb.auth.signUp({ email: email, password: senha });

  if (signUpData.error) {
    var msg = signUpData.error.message;
    if (msg.includes('already registered')) msg = 'Este e-mail ja esta cadastrado.';
    toast('Erro: ' + msg, 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = originalText; }
    return;
  }

  var newUserId = signUpData.data && signUpData.data.user ? signUpData.data.user.id : null;

  if (!newUserId) {
    // Usuário criado mas id não retornou (confirmação de e-mail ativa no Supabase)
    // Orienta o admin a desativar a confirmação
    openModal('Configuração necessária',
      '<div style="background:var(--warning-light);border:1px solid #FFE082;border-radius:8px;padding:1rem;margin-bottom:1rem">' +
        '<p style="font-weight:600;color:var(--warning);margin-bottom:6px">Etapa extra necessária</p>' +
        '<p style="font-size:13px;color:var(--gray-700)">O Supabase está com confirmação de e-mail ativada. Para criar usuários diretamente, desative essa opção:</p>' +
      '</div>' +
      '<ol style="font-size:13px;line-height:2;padding-left:1.25rem;color:var(--gray-700)">' +
        '<li>Acesse o painel do <strong>Supabase</strong></li>' +
        '<li>Vá em <strong>Authentication → Providers → Email</strong></li>' +
        '<li>Desmarque <strong>"Confirm email"</strong></li>' +
        '<li>Salve e tente criar o usuário novamente</li>' +
      '</ol>' +
      '<div class="form-actions"><button class="btn btn-primary" onclick="closeModal()">Entendido</button></div>'
    );
    return;
  }

  // Insere o perfil na tabela
  var profileResult = await sb.from('perfis').insert([{
    id: newUserId,
    nome: nome,
    email: email,
    perfil: perfil
  }]);

  if (profileResult.error) {
    toast('Usuário criado no sistema de autenticação, mas houve erro ao salvar o perfil. Contate o suporte.', 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = originalText; }
    return;
  }

  toast('Usuário "' + nome + '" criado com sucesso!', 'success');
  closeModal();
  await carregarUsuarios();
}

async function toggleUsuarioAtivo(id, ativo) {
  var msg = ativo ? 'Ativar este usuário?' : 'Desativar este usuário?';
  if (!confirm(msg)) return;
  var { error } = await sb.from('perfis').update({ ativo: ativo }).eq('id', id);
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast(ativo ? 'Usuário ativado!' : 'Usuário desativado!', 'success');
  await carregarUsuarios();
}



async function salvarUsuario(id) {
  const nome = document.getElementById('usr-nome').value.trim();
  const perfil = document.getElementById('usr-perfil').value;
  const ativo = document.getElementById('usr-ativo').value === 'true';

  const { error } = await sb.from('perfis').update({ nome, perfil, ativo }).eq('id', id);
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast('Usuário atualizado!', 'success');
  closeModal();
  renderUsuarios();
}

function excluirVendaAvulsa(id) {
  window._pendingDeleteId = id;
  openModal('Excluir Venda', '<div style="background:var(--danger-light);border:1px solid #F5C2C0;border-radius:8px;padding:1rem;margin-bottom:1.25rem"><p style="font-size:14px;color:var(--danger);font-weight:600;margin-bottom:4px">Esta acao nao pode ser desfeita.</p><p style="font-size:13px;color:var(--gray-700)">O registro da venda sera removido permanentemente.</p></div><div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-danger" onclick="confirmarExcluirVenda()">Excluir venda</button></div>');
}

async function confirmarExcluirVenda() {
  var id = window._pendingDeleteId;
  var btn = document.querySelector('.btn-danger');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Excluindo...'; }
  var result = await sb.from('vendas_avulsas').delete().eq('id', id);
  if (result.error) { toast('Erro: ' + result.error.message, 'error'); if(btn){btn.disabled=false;btn.innerHTML='Excluir venda';} return; }
  toast('Venda excluida.', 'success');
  closeModal();
  renderVendas();
}

function excluirCliente(id) {
  window._pendingDeleteId = id;
  var c = window._clientesCache ? window._clientesCache[id] : null;
  var nome = c ? c.nome : 'este cliente';
  openModal('Excluir Cliente', '<div style="background:var(--danger-light);border:1px solid #F5C2C0;border-radius:8px;padding:1rem;margin-bottom:1.25rem"><p style="font-size:14px;color:var(--danger);font-weight:600;margin-bottom:4px">Esta acao nao pode ser desfeita.</p><p style="font-size:13px;color:var(--gray-700)">Cliente <strong>' + nome + '</strong> e seus veiculos serao inativados.</p></div><p style="font-size:13px;color:var(--gray-600);margin-bottom:1.25rem">Os agendamentos e historico serao preservados.</p><div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-danger" onclick="confirmarExcluirCliente()">Excluir cliente</button></div>');
}

async function confirmarExcluirCliente() {
  var id = window._pendingDeleteId;
  var btn = document.querySelector('.btn-danger');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Excluindo...'; }
  var result = await sb.from('clientes').update({ ativo: false }).eq('id', id);
  if (result.error) { toast('Erro: ' + result.error.message, 'error'); if(btn){btn.disabled=false;btn.innerHTML='Excluir cliente';} return; }
  toast('Cliente removido da lista.', 'success');
  closeModal();
  carregarClientes();
}

function excluirVeiculo(id) {
  window._pendingDeleteId = id;
  var v = window._veiculosCache ? window._veiculosCache[id] : null;
  var placa = v ? v.placa : 'veiculo';
  var modelo = v ? v.modelo : '';
  openModal('Excluir Veiculo', '<div style="background:var(--danger-light);border:1px solid #F5C2C0;border-radius:8px;padding:1rem;margin-bottom:1.25rem"><p style="font-size:14px;color:var(--danger);font-weight:600;margin-bottom:4px">Esta acao nao pode ser desfeita.</p><p style="font-size:13px;color:var(--gray-700)">Veiculo <strong>' + placa + ' - ' + modelo + '</strong> sera inativado.</p></div><p style="font-size:13px;color:var(--gray-600);margin-bottom:1.25rem">O historico de lavagens sera preservado.</p><div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-danger" onclick="confirmarExcluirVeiculo()">Excluir veiculo</button></div>');
}

async function confirmarExcluirVeiculo() {
  var id = window._pendingDeleteId;
  var btn = document.querySelector('.btn-danger');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Excluindo...'; }
  var result = await sb.from('veiculos').update({ ativo: false }).eq('id', id);
  if (result.error) { toast('Erro: ' + result.error.message, 'error'); if(btn){btn.disabled=false;btn.innerHTML='Excluir veiculo';} return; }
  toast('Veiculo removido da lista.', 'success');
  closeModal();
  carregarVeiculos();
}

    document.getElementById('modal-overlay').classList.remove('active');
    toggleSidebar(false);
  }
});

checkSession();

<!--
═══════════════════════════════════════════════════════
INTEGRAÇÃO COM GOOGLE AGENDA
═══════════════════════════════════════════════════════
A integração com Google Calendar NÃO pode ser feita
diretamente do browser via fetch por restrições CORS
e OAuth do Google. As alternativas viáveis são:

OPÇÃO A — Google Calendar API via backend (recomendada):
  1. Crie um projeto no Google Cloud Console
  2. Habilite a Google Calendar API
  3. Crie credenciais OAuth 2.0 (Desktop ou Web App)
  4. Use uma Supabase Edge Function como intermediária:

     // supabase/functions/google-calendar/index.ts
     import { serve } from "https://deno.land/std@0.168.0/http/server.ts"
     const GOOGLE_TOKEN = Deno.env.get('GOOGLE_ACCESS_TOKEN')

     serve(async (req) => {
       const { summary, start, end, description } = await req.json()
       const res = await fetch(
         'https://www.googleapis.com/calendar/v3/calendars/primary/events',
         {
           method: 'POST',
           headers: {
             'Authorization': 'Bearer ' + GOOGLE_TOKEN,
             'Content-Type': 'application/json'
           },
           body: JSON.stringify({ summary, description,
             start: { dateTime: start },
             end: { dateTime: end }
           })
         }
       )
       const data = await res.json()
       return new Response(JSON.stringify(data), {
         headers: { 'Content-Type': 'application/json' }
       })
     })

  5. Ao criar/atualizar um agendamento, chame:
     await sb.functions.invoke('google-calendar', {
       body: { summary: cliente+' - '+servico, start, end, description: placa }
     })

OPÇÃO B — Link "Adicionar ao Google Agenda":
  Gere um link no formato:
  https://calendar.google.com/calendar/render?action=TEMPLATE
    &text=Lavagem%20João%20Silva
    &dates=20241215T090000/20241215T100000
    &details=Placa%3A%20ABC-1234
  Exiba um botão "📅 Adicionar ao Google Agenda" em cada agendamento.
  Zero configuração necessária — funciona imediatamente.

OPÇÃO C — ICS (iCalendar) para export:
  Gere um arquivo .ics com os agendamentos do dia
  para importar em qualquer calendário.

RECOMENDAÇÃO: implemente a Opção B imediatamente (mais simples)
e evolua para a Opção A com a Edge Function quando necessário.
═══════════════════════════════════════════════════════
-->
